[general]
fontname=Hack Nerd Font, PingFang SC, Noto Sans CJK SC, Source Han Sans CN 11
selchars=-A-Za-z0-9./?#_$*+<>@\^|~
scrollback=1000
bgcolor=rgb(40,41,53)
fgcolor=rgb(208,208,208)
palette_color_0=rgb(28,28,28)
palette_color_1=rgb(214,134,134)
palette_color_2=rgb(174,214,134)
palette_color_3=rgb(215,175,135)
palette_color_4=rgb(134,174,214)
palette_color_5=rgb(214,174,214)
palette_color_6=rgb(138,219,180)
palette_color_7=rgb(208,208,208)
palette_color_8=rgb(176,176,176)
palette_color_9=rgb(214,134,134)
palette_color_10=rgb(174,214,134)
palette_color_11=rgb(228,201,175)
palette_color_12=rgb(134,174,214)
palette_color_13=rgb(214,174,214)
palette_color_14=rgb(177,231,221)
palette_color_15=rgb(239,239,239)
color_preset=Custom
disallowbold=false
boldbright=false
cursorblinks=false
cursorunderline=false
audiblebell=false
visualbell=false
tabpos=top
geometry_columns=80
geometry_rows=24
hidescrollbar=true
hidemenubar=true
hideclosebutton=true
hidepointer=true
disablef10=false
disablealt=false
disableconfirm=false
tabwidth=100

[shortcut]
new_window_accel=<Primary><Shift>n
new_tab_accel=<Primary><Shift>t
close_tab_accel=<Primary><Shift>w
close_window_accel=<Primary><Shift>q
copy_accel=<Primary><Shift>c
paste_accel=<Primary><Shift>v
name_tab_accel=<Primary><Shift>i
previous_tab_accel=<Primary>Page_Up
next_tab_accel=<Primary>Page_Down
move_tab_left_accel=<Primary><Shift>Page_Up
move_tab_right_accel=<Primary><Shift>Page_Down
zoom_in_accel=<Primary><Shift>plus
zoom_out_accel=<Primary><Shift>underscore
zoom_reset_accel=<Primary><Shift>parenright
